<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>talk to yourself</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <span id="app-title">talk to yourself</span>
      <button id="settings-btn" title="Settings">&#9881;</button>
    </header>

    <div id="settings-panel" hidden>
      <div class="settings-section">
        <h3>Cloudflare Sync</h3>
        <label for="cf-url">Worker URL</label>
        <input type="url" id="cf-url" placeholder="https://your-worker.workers.dev">
        <label for="cf-secret">Secret</label>
        <input type="password" id="cf-secret" placeholder="your shared secret">
        <div class="settings-row">
          <button id="save-cf-btn">Save</button>
          <button id="sync-btn">Sync now</button>
          <span id="sync-status"></span>
        </div>
      </div>
      <div class="settings-section">
        <h3>Backup</h3>
        <div class="settings-row">
          <button id="export-btn">Export JSON</button>
          <label class="import-label" for="import-file">Import JSON</label>
          <input type="file" id="import-file" accept=".json" hidden>
        </div>
      </div>
    </div>

    <div id="feed"></div>

    <div id="compose-area" class="mode-me">
      <div id="compose-mode">
        <button id="mode-me" class="active">me</button>
        <button id="mode-them">them</button>
      </div>
      <div id="compose-row">
        <textarea id="compose" placeholder="write something..." rows="3"></textarea>
        <button id="send-btn">Send</button>
      </div>
    </div>
  </div>

  <script src="storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
